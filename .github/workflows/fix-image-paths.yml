name: Fix image paths for email templates

on:
  push:
    paths:
      - '**.html'

jobs:
  fix-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit fixed paths
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          BASE_URL="https://luchogranadosg.github.io/testactions"
          
          find . -name "*.html" -not -path "./.git/*" | while read file; do
            sed -i 's|src="\(\.\./\)\+assets/images/|src="'"$BASE_URL"'/assets/images/|g' "$file"
            sed -i 's|src='"'"'\(\.\./\)\+assets/images/|src='"'"''"$BASE_URL"'/assets/images/|g' "$file"
          done

          git pull origin main --rebase
          git diff --quiet && git diff --staged --quiet || (git add -A && git commit -m "chore: replace local image paths with GitHub Pages URLs")
          git push origin main